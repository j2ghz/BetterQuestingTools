name: Coverage

on:
  push:
    branches: [master]
  pull_request:

permissions:
  contents: read

jobs:
  coverage:
    name: Run coverage and upload to Codecov
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@6c3c2f2c1c457b00c10c4848d6f5491db3b629df # v2.18.0
        with:
          egress-policy: audit

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - run: aria2c -i links.txt
        working-directory: samples

      - name: Set up Rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@2b1f5e9b395427c92ee4e3331786ca3c37afe2d7

      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@0c7a94999971db56e9df89df226240aab222e776
        with:
          tool: cargo-llvm-cov

      - name: Download dependencies
        run: cargo fetch
        shell: bash

      - name: Generate code coverage
        run: cargo llvm-cov --all-features --workspace --codecov --output-path codecov.json

      - name: Upload coverage data to Codecov
        if: ${{ !cancelled() }}
        uses: codecov/codecov-action@671740ac38dd9b0130fbe1cec585b89eea48d3de
        with:
          files: codecov.json
          use_oidc: true
